name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: clippy
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Check Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --locked --package ferrumtty-client
          $executable = (Resolve-Path "target/release/ferrumtty.exe").Path
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -products * -find "**/Hostx64/x64/dumpbin.exe" |
            Select-Object -First 1
          if (-not $dumpbin) {
            throw "dumpbin.exe was not found"
          }
          $imports = & $dumpbin /dependents $executable
          $redistributablePatterns = @(
            'VCRUNTIME140(_1)?\.dll',
            'MSVCP140\.dll',
            'ucrtbase\.dll',
            'api-ms-win-crt-[A-Za-z0-9_-]+\.dll'
          )
          foreach ($pattern in $redistributablePatterns) {
            if ($imports -match $pattern) {
              throw "Windows executable imports a redistributable CRT dependency matching $pattern"
            }
          }

  cross-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.target }}
      - run: cargo check --workspace --locked --target ${{ matrix.target }}
