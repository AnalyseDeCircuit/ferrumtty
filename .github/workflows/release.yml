name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: clippy
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.target }}
      - name: Build release archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/package-release.sh "${version}" "${{ matrix.target }}"
      - name: Check Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $executable = (Resolve-Path "target/${{ matrix.target }}/release/ferrumtty.exe").Path
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -products * -find "**/Hostx64/x64/dumpbin.exe" |
            Select-Object -First 1
          if (-not $dumpbin) {
            throw "dumpbin.exe was not found"
          }
          $imports = & $dumpbin /dependents $executable
          $redistributablePatterns = @(
            'VCRUNTIME140(_1)?\.dll',
            'MSVCP140\.dll',
            'ucrtbase\.dll',
            'api-ms-win-crt-[A-Za-z0-9_-]+\.dll'
          )
          foreach ($pattern in $redistributablePatterns) {
            if ($imports -match $pattern) {
              throw "Windows executable imports a redistributable CRT dependency matching $pattern"
            }
          }
      - uses: actions/upload-artifact@v7
        with:
          name: ferrumtty-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ferrumtty-*
          path: release-assets
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --verify-tag
          --generate-notes
          --title "FerrumTTY ${GITHUB_REF_NAME}"
